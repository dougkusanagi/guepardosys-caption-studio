name: 'Publish Release'

on:
  push:
    tags:
      - 'v*' # Dispara quando uma tag começando com 'v' é enviada (ex: v1.0.0)

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          # Caso queira gerar também para macOS e Linux futuramente, basta descomentar as linhas abaixo.
          # Nota: builds de macOS consomem mais minutos gratuitos do GitHub Actions (multiplicador de 10x).
          # - platform: 'macos-latest'
          #   args: ''
          # - platform: 'ubuntu-22.04'
          #   args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv (Python)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Garante que a versão correta do Python seja usada para compilar o backend
          python-version: '3.11'

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # __VERSION__ será substituído pela versão do package.json / Cargo.toml
          releaseName: 'StudioCut v__VERSION__'
          releaseBody: 'Release automática gerada pelo GitHub Actions.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
